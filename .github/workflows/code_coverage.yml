name: R Package Test Coverage

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - dev
  push:
    branches:
      - dev

jobs:
  code-coverage:
    runs-on: macos-latest
    name: Create R Package Coverage Report
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-tinytex@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"

      - name: Install dependencies
        run: |
          Rscript -e 'options(repos = c(CRAN = "https://packagemanager.posit.co/cran/latest"))'
          Rscript -e 'install.packages(c("devtools", "roxygen2", "remotes", "patrick", "pak", "covr"))'
          Rscript -e 'pak::pkg_install(devtools::dev_package_deps()$package)'

      - name: Run coverage and upload to Codecov
        run: Rscript -e 'covr::codecov()'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_API_TOKEN }}
      
      # NOTE: Not uploading artifact currently to save time
