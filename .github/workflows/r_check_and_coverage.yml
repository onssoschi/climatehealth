name: R CMD Check and Coverage

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
      - dev

  push:
    branches:
      - main
      - dev

  workflow_dispatch:
    inputs:
      run_integration:
        description: Run opt-in integration tests
        type: boolean
        default: false

jobs:
  run-macos:
    runs-on: macos-latest
    name: R CMD Check and Coverage
    env:
      NOT_CRAN: "true"
      RUN_INTEGRATION: ${{ github.event_name == 'workflow_dispatch' && inputs.run_integration && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
        timeout-minutes: 5

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-tinytex@v2

      - name: Restore cached R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Set R options
        run: echo 'options(pkgType = "both")' >> ~/.Rprofile

      - name: Cache Homebrew Formulae
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/Cellar/gdal
            /usr/local/Cellar/proj
            /usr/local/Cellar/geos
            /usr/local/Cellar/sqlite
            /opt/homebrew/Cellar/gdal
            /opt/homebrew/Cellar/proj
            /opt/homebrew/Cellar/geos
            /opt/homebrew/Cellar/sqlite
          key: homebrew-${{ runner.os }}-${{ hashFiles('DESCRIPTION') }}
          restore-keys: |
            homebrew-${{ runner.os }}-

      - name: Install geospatial system libraries for Terra
        run: |
          brew install pkg-config gdal proj geos sqlite || true
          brew link --overwrite gdal proj geos sqlite || true

      - name: Show test mode
        run: |
          echo "RUN_INTEGRATION=${RUN_INTEGRATION}"
          echo "NOT_CRAN=${NOT_CRAN}"

      - name: Install dependencies
        run: |
          Rscript -e '
                install.packages(c(
                  "devtools", "roxygen2", "remotes", "patrick", "pak", "covr",
                  "DT", "htmltools", "mockery", "openxlsx", "fmesher",
                  "knitr", "rmarkdown"
                ))
                install.packages("sf", type = "binary")
                install.packages("terra", type = "source")
                install.packages(
                  "INLA",
                  repos = "https://inla.r-inla-download.org/R/stable"
                )
                pak::local_install(
                  ".",
                  dependencies = c("Depends", "Imports", "LinkingTo"),
                  upgrade = FALSE
                )
          '
        timeout-minutes: 5

      - name: Run package post-install health check
        run: |
          Rscript -e 'get("pkg_health_check", envir = asNamespace("climatehealth"))(verbose = TRUE)'

      - name: Run R CMD Check
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: false
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage report to Codecov
        env:
          RUN_INTEGRATION: "true"
          CODECOV_TOKEN: ${{ secrets.CODECOV_API_TOKEN }}
        run: Rscript -e 'covr::codecov()'

        timeout-minutes: 5

#      - name: Print coverage for quick view
#        run: |
#          Rscript -e 'print(covr::package_coverage())'
