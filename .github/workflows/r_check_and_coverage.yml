name: R CMD Check and Coverage

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - dev
  push:
    branches:
      - dev

jobs:
  run-macos:
    runs-on: macos-latest
    name: R CMD Check and Coverage
    steps:
      - uses: actions/checkout@v4

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/R
          key: ${{ runner.os }}-r-${{ hashFiles('DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-tinytex@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"

      - name: Install dependencies
        run: |
          Rscript -e 'options(repos = c(CRAN = "https://packagemanager.posit.co/cran/latest"))'
          Rscript -e 'install.packages(c("devtools", "roxygen2", "remotes", "patrick", "pak", "covr"))'
          Rscript -e 'pak::pkg_install(devtools::dev_package_deps()$package)'
      
      - name: Save R package cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/R
          key: ${{ runner.os }}-r-${{ hashFiles('DESCRIPTION') 

      - name: Run R CMD Check
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create R Package Coverage Report
        run: |
          Rscript -e "
            coverage <- covr::package_coverage()
            covr::codecov(coverage)
            covr::report(coverage, file = 'coverage.html')
          "
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_API_TOKEN }}
      
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html
