name: R CMD Check and Coverage

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - dev
  push:
    branches:
      - dev

jobs:
  run-macos:
    runs-on: macos-latest
    name: R CMD Check and Coverage
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
  
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-tinytex@v2

      - name: Restore cached R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install dependencies
        run: |
          Rscript -e '
          install.packages(c("devtools", "roxygen2", "remotes", "patrick", "pak", "covr", "DT", "htmltools"))
          pak::pkg_install(devtools::dev_package_deps()$package)
          '

      - name: Run R CMD Check
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage report to Codecov
        run: |
          Rscript -e 'covr::codecov()'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_API_TOKEN }}
      
      - name: Print coverage for quick view
        run: |
          Rscript -e 'print(covr::package_coverage())'
