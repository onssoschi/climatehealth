name: R CMD Check and Coverage

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
      - dev
      
  push:
    branches:
      - main
      - dev

jobs:
  run-macos:
    runs-on: macos-latest
    name: R CMD Check and Coverage
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
        timeout-minutes: 5

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-tinytex@v2

      - name: Restore cached R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Set R options
        run: echo 'options(pkgType = "binary")' >> ~/.Rprofile

      - name: Install dependencies
        run: |
          Rscript -e '
          install.packages(c(
            "devtools", "roxygen2", "remotes", "patrick", "pak", "covr", "DT",
            "htmltools", "mockery", "openxlsx", "fmesher", "knitr", "rmarkdown"
          ))
          install.packages("sf", type = "binary")
          install.packages("terra", repos="https://rspatial.r-universe.dev")
          install.packages(
            "INLA",
            repos = "https://inla.r-inla-download.org/R/stable"
          )
          pak::local_install(".", dependencies = c("Depends", "Imports", "LinkingTo"))
          '
        timeout-minutes: 5

      - name: Run package post-install health check
        run: |
          Rscript -e 'get("pkg_health_check", envir = asNamespace("climatehealth"))(verbose = TRUE)'

      - name: Run R CMD Check
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: false
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage report to Codecov
        run: |
          Rscript -e 'covr::codecov()'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_API_TOKEN }}
        timeout-minutes: 5

#      - name: Print coverage for quick view
#        run: |
#          Rscript -e 'print(covr::package_coverage())'
