name: Build R Package on Release

on:
  release:
    types: [published]

jobs:
  build-macos:
    runs-on: macos-latest
    name: Build on macOS
    steps:
      - uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"

      - name: Install dependencies
        run: |
          Rscript -e 'options(repos = c(CRAN = "https://packagemanager.posit.co/cran/latest"))'
          Rscript -e 'install.packages(c("devtools", "roxygen2", "remotes"))'

      - name: Build package
        run: |
          R CMD build .

      - name: Upload macOS artifact
        uses: softprops/action-gh-release@v1
        with:
          files: "*.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    name: Build on Windows
    steps:
      - uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"

      - name: Install dependencies
        run: |
          Rscript -e 'options(repos = c(CRAN = "https://packagemanager.posit.co/cran/latest"))'
          Rscript -e 'install.packages(c("devtools", "roxygen2", "remotes"))'

      - name: Build package
        shell: bash
        run: |
          R CMD build .

      - name: Upload Windows artifact
        uses: softprops/action-gh-release@v1
        with:
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
