default:
  # Input data #'tests/testthat/testdata/regEngWalesPop.csv'
  input_csv_path: "C:/Users/sempll1/OneDrive - Office for National Statistics/Wellcome project/Framework development/Heat indicator/Code development/Final_input_data/20231127_input_data_reg_sex.csv"

  # Output folder path 'tests/testthat'
  output_folder_path: 'tests/tests_Layli/region/by_sex/2019/Female/'

  # Whether to perform meta-analysis (boolean). Must be TRUE if by_region is FALSE
  meta_analysis: TRUE

  # Whether to disaggregate by region. Must be TRUE if meta-analysis is FALSE.
  by_region: TRUE

  # Define columns
  dependent_col: deaths_sex_F
  time_col: date
  region_col: reg_name
  temp_col: tmean
  population_col: reg_sex_F_pop

  # Extra independent variables. Cross-basis, day of the week, and seasonal spline included by default. Use ('NONE' if none).
  independent_col1: 'ma_imputed_pm10'
  independent_col2: 'dow'
  independent_col3: 'NONE'
  independent_col4: 'NONE'

  # Number of years for the calculation of RR distribution. Set both as 'NONE' to use full range in data.
  RR_distribution_length: 15

  # Year to calculate output for
  output_year: 2019

  # Specification of the exposure function
  varfun: 'bs' # Exposure function (see dlnm::crossbasis)
  vardegree:  2 # Degrees of freedom in exposure function (see dlnm::crossbasis)

  # Specification of the lag function
  lag: 21 # Lag length in days (see dlnm::logknots)
  lagnk: 3 # Number of knots in lag function (see dlnm::logknots)

  # Degree of freedom for seasonality
  dfseas: 8

  # Whether to save results figure and CSVs (Boolean)
  save_fig: TRUE
  save_csv: TRUE

