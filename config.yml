default:
  # Input data
  # input_csv_path: 'tests/testthat/testdata/regEngWales.csv'
  input_csv_path: 'C:/Users/soutte/Office for National Statistics/Climate and Health - First run/complete_input_data_20230726.csv'

  # Output folder path
  output_folder_path: 'output/'

  # Whether to perform meta-analysis (boolean). Must be TRUE if by_region is FALSE
  meta_analysis: TRUE

  # Whether to disaggregate by region. Must be TRUE if meta-analysis is FALSE.
  by_region: FALSE

  # Define columns
  dependent_col: death
  time_col: date
  region_col: regnames
  temp_col: tmean

  # Formula
  independent_col:
    - cb # Cross-basis for temperature variable
    - dow # Day of week
    - ns(date, df = dfseas * length(unique(year))) # Seasonal B-spline

  # Specification of the exposure function
  varfun: 'bs' # Exposure function (see dlnm::crossbasis)
  vardegree:  2 # Degrees of freedom in exposure function (see dlnm::crossbasis)
  varper: !expr c(10, 75, 90) # Internal knot positions in exposure function (see dlnm::crossbasis)

  # Specification of the lag function
  lag: 21 # Lag length in days (see dlnm::logknots)
  lagnk: 3 # Number of knots in lag function (see dlnm::logknots)

  # Degree of freedom for seasonality
  dfseas: 8

  # Whether to save results figure and CSVs (Boolean)
  save_fig: TRUE
  save_csv: TRUE
