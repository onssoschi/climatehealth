default:
  # #  Input data
  # input_csv_path: "C:/Users/sempll1/OneDrive - Office for National Statistics/Wellcome project/Framework development/Heat indicator/Code development/Final_input_data/20231204_input_data_reg_age_NEW.csv"
  input_csv_path: "testdata/regEngWalesPop.csv"
  output_folder_path: "testdata/"

  # Whether to perform meta-analysis (boolean). Must be TRUE if by_region is FALSE
  meta_analysis: TRUE

  # Whether to disaggregate by region. Must be TRUE if meta-analysis is FALSE.
  by_region: TRUE

  # Define columns
  dependent_col: death
  time_col: date
  region_col: regnames
  temp_col: tmean
  population_col: pop

  # Extra independent variables. Cross-basis and seasonal spline included by default. Use NULL if none.
  independent_cols: NULL

  # Number of years for the calculation of RR distribution. Set as 0 to use full range in data (must be < 15 years).
  RR_distribution_length: 0

  # Year to calculate output for. Set as 0 to use most recent year (all of the data). The output is the average of the output_year and the previous 5 years.
  output_year: 0

  # Specification of the exposure function
  varfun: 'bs' # Exposure function (see dlnm::crossbasis)
  vardegree:  2 # Degrees of freedom in exposure function (see dlnm::crossbasis)

  # Specification of the lag function
  lag: 21 # Lag length in days (see dlnm::logknots)
  lagnk: 3 # Number of knots in lag function (see dlnm::logknots)

  # Degree of freedom for seasonality
  dfseas: 8

  # The number of simulation runs used for computing emprical CI, defaults to 1000
  nsim: 1000

  # Whether to save results figure and CSVs (Boolean)
  save_fig: TRUE
  save_csv: TRUE

